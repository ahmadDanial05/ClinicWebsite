<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Masuk - Sistem Pengurusan Klinik</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>🏥 Sistem Pengurusan Klinik</h1>
                <p>Sila log masuk untuk meneruskan</p>
            </div>

            <div id="loginError" class="alert alert-danger" style="display: none;"></div>

            <form id="formLogin">
                <div class="form-group">
                    <label for="username">Nama Pengguna</label>
                    <input type="text" id="username" required placeholder="Masukkan nama pengguna" autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Kata Laluan</label>
                    <div style="position: relative;">
                        <input type="password" id="password" required placeholder="Masukkan kata laluan">
                        <button type="button" id="togglePassword" onclick="togglePassword()" 
                                style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); 
                                       background: none; border: none; cursor: pointer; font-size: 1.2rem;">
                            🔒
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                    🔐 Log Masuk
                </button>
            </form>

            <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color); 
                        text-align: center; color: var(--text-secondary); font-size: 0.875rem;">
                <p><strong>Demo Login:</strong></p>
                <p>Username: <code>admin</code> | Password: <code>admin123</code></p>
            </div>

            <div style="margin-top: 1.5rem; text-align: center; color: var(--text-secondary); font-size: 0.875rem;">
                <p>&copy; 2026 Sistem Pengurusan Klinik. All rights reserved.</p>
            </div>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
